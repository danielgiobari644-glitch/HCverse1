<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HCVerse - Christian Fellowship Community</title>

    <script>
      // Gracefully silence and intercept benign websocket connection failures in dev environments
      (function() {
        const OriginalWebSocket = window.WebSocket;
        if (OriginalWebSocket) {
          const WrappedWebSocket = function(url, protocols) {
            try {
              const ws = new OriginalWebSocket(url, protocols);
              ws.addEventListener('error', (e) => {
                console.debug('Handled dev environment WebSocket error safely:', e);
              });
              return ws;
            } catch (err) {
              console.debug('Handled dev environment WebSocket instantiation error safely:', err);
              return {
                addEventListener: () => {},
                removeEventListener: () => {},
                close: () => {},
                send: () => {},
                readyState: 3
              };
            }
          };
          WrappedWebSocket.CONNECTING = 0;
          WrappedWebSocket.OPEN = 1;
          WrappedWebSocket.CLOSING = 2;
          WrappedWebSocket.CLOSED = 3;
          WrappedWebSocket.prototype = OriginalWebSocket.prototype;
          window.WebSocket = WrappedWebSocket;
        }

        // Catch the unhandled rejections that might fire prior to standard module registrations
        window.addEventListener('unhandledrejection', event => {
          const reason = event.reason;
          if (reason) {
            const reasonStr = String(reason).toLowerCase();
            const reasonMsgStr = (reason.message || String(reason)).toLowerCase();
            if (
              reasonStr.includes('websocket') || 
              reasonMsgStr.includes('websocket') ||
              reasonStr.includes('closed without opened') ||
              reasonMsgStr.includes('closed without') ||
              reasonStr.includes('vite') ||
              reasonMsgStr.includes('vite')
            ) {
              event.preventDefault();
              event.stopImmediatePropagation();
              console.debug('Muted early development WebSocket rejection:', reason);
            }
          }
        });

        window.addEventListener('error', event => {
          const msgStr = (event.message || String(event)).toLowerCase();
          if (
            msgStr.includes('websocket') ||
            msgStr.includes('closed without opened') ||
            msgStr.includes('closed without') ||
            msgStr.includes('vite')
          ) {
            event.preventDefault();
            event.stopImmediatePropagation();
            console.debug('Muted early development error:', event.message || event);
          }
        });
      })();
    </script>

    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23a78bfa' stroke-width='2'%3E%3Cpath d='M5 12h14M12 5v14'/%3E%3C/svg%3E" />
    <!-- Preconnect to Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500;600&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Compiled layout stylesheets -->
    <link rel="stylesheet" href="./bundle.css" />
    <!-- PWA Application Manifest specifications -->
    <link rel="manifest" href="./manifest.json" />

    <!-- Service Worker background sync & offline cache activation -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js')
            .then(reg => console.log('[PWA] ServiceWorker registered scope:', reg.scope))
            .catch(err => console.warn('[PWA] ServiceWorker register failed:', err));
        });
      }
    </script>
  </head>
  <body class="bg-[#07070B] text-white antialiased min-h-screen font-['Inter',_sans-serif] selection:bg-purple-500/30 selection:text-white">
    <!-- Ambient backgrounds: Celestial Moving Beams & Depth layers -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
      <div class="absolute w-[50rem] h-[50rem] -top-60 -left-60 rounded-full bg-purple-900/5 blur-[150px] animate-orb1 opacity-60"></div>
      <div class="absolute w-[45rem] h-[45rem] -bottom-40 -right-40 rounded-full bg-indigo-950/5 blur-[140px] animate-orb2 opacity-50"></div>
      <div class="absolute w-[35rem] h-[35rem] top-[30%] left-[25%] rounded-full bg-violet-950/5 blur-[120px] animate-orb3 opacity-30"></div>
      <!-- Subtle starlight grid noise background -->
      <div class="absolute inset-0 bg-[radial-gradient(rgba(255,255,255,0.015)_1px,transparent_1px)] [background-size:24px_24px] opacity-40"></div>
    </div>

    <!-- Main Entry Container -->
    <div id="root" class="relative z-10 min-h-screen flex flex-col">
      <!-- Loading gate on first session -->
      <div id="initial-loading-gate" class="flex-grow flex flex-col items-center justify-center space-y-4">
        <div class="relative w-20 h-20">
          <div class="absolute inset-0 rounded-full border-2 border-purple-500/10"></div>
          <div class="absolute inset-0 rounded-full border-t-2 border-r-2 border-purple-500 animate-spin"></div>
          <div class="absolute inset-4 rounded-full border border-purple-400/20 flex items-center justify-center">
            <span class="text-xl font-bold text-purple-400 animate-pulse">✝</span>
          </div>
        </div>
        <div class="text-center">
          <h2 class="text-xl font-bold font-['Space_Grotesk'] text-white">HCVerse</h2>
          <p class="text-xs text-purple-400/60 mt-1">Strengthening our fellowship...</p>
        </div>
      </div>
    </div>

    <!-- Beautiful PWA Install / Download Prompt Banner (Floating Modal/Toast) -->
    <div id="pwa-download-prompt" class="hidden fixed bottom-6 left-6 right-6 md:left-auto md:right-8 md:bottom-8 md:w-96 bg-[#110e2c]/95 backdrop-blur-xl border border-purple-500/30 rounded-2xl p-4.5 shadow-[0_12px_45px_rgba(167,139,250,0.22)] z-[9999] animate-fade-in flex flex-col gap-3.5 border-l-4 border-l-purple-500 text-white select-none">
      <div class="flex items-start gap-3">
        <!-- Floating cross emblem -->
        <div class="w-10 h-10 rounded-xl bg-purple-500/15 border border-purple-400/35 flex items-center justify-center text-xl flex-shrink-0 text-purple-400 animate-pulse">
          ✝
        </div>
        <div class="flex-grow text-left">
          <h4 class="text-xs font-bold tracking-wide uppercase font-['Space_Grotesk'] text-purple-300">Install HCVerse App</h4>
          <p id="pwa-prompt-text" class="text-[11px] text-[#b3afdf] leading-relaxed mt-1 font-sans">
            Add HCVerse to your home screen! Get offline access, faster study tools, and an immersive premium experience.
          </p>
        </div>
        <button id="pwa-prompt-close" class="text-purple-300/80 hover:text-white p-1 text-sm font-semibold cursor-pointer select-none">&times;</button>
      </div>
      <div class="flex gap-2.5 items-center">
        <button id="pwa-prompt-install-btn" class="flex-grow bg-purple-600 hover:bg-purple-500 text-white font-extrabold text-xs py-2 px-3.5 rounded-xl shadow-lg hover-lift btn-press cursor-pointer flex justify-center items-center gap-1.5 transition-all">
          📲 Get App (Install)
        </button>
        <button id="pwa-prompt-dismiss-btn" class="text-[10px] font-bold text-purple-300/80 hover:text-white px-2.5 py-1.5 uppercase tracking-wide cursor-pointer">
          Maybe Later
        </button>
      </div>
    </div>

    <script type="module" src="./bundle.js"></script>
  </body>
</html>
