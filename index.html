<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HCVerse - Christian Fellowship Community</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23a78bfa' stroke-width='2'%3E%3Cpath d='M5 12h14M12 5v14'/%3E%3C/svg%3E" />
    <!-- Preconnect to Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500;600&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body class="bg-[#07070B] text-white antialiased min-h-screen font-['Inter',_sans-serif] selection:bg-purple-500/30 selection:text-white">
    <!-- Ambient backgrounds: Celestial Moving Beams & Depth layers -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
      <div class="absolute w-[50rem] h-[50rem] -top-60 -left-60 rounded-full bg-purple-900/5 blur-[150px] animate-orb1 opacity-60"></div>
      <div class="absolute w-[45rem] h-[45rem] -bottom-40 -right-40 rounded-full bg-indigo-950/5 blur-[140px] animate-orb2 opacity-50"></div>
      <div class="absolute w-[35rem] h-[35rem] top-[30%] left-[25%] rounded-full bg-violet-950/5 blur-[120px] animate-orb3 opacity-30"></div>
      <!-- Subtle starlight grid noise background -->
      <div class="absolute inset-0 bg-[radial-gradient(rgba(255,255,255,0.015)_1px,transparent_1px)] [background-size:24px_24px] opacity-40"></div>
    </div>

    <!-- Main Entry Container -->
    <div id="root" class="relative z-10 min-h-screen flex flex-col">
      <!-- Loading gate on first session -->
      <div id="initial-loading-gate" class="flex-grow flex flex-col items-center justify-center space-y-4">
        <div class="relative w-20 h-20">
          <div class="absolute inset-0 rounded-full border-2 border-purple-500/10"></div>
          <div class="absolute inset-0 rounded-full border-t-2 border-r-2 border-purple-500 animate-spin"></div>
          <div class="absolute inset-4 rounded-full border border-purple-400/20 flex items-center justify-center">
            <span class="text-xl font-bold text-purple-400 animate-pulse">✝</span>
          </div>
        </div>
        <div class="text-center">
          <h2 class="text-xl font-bold font-['Space_Grotesk'] text-white">HCVerse</h2>
          <p class="text-xs text-purple-400/60 mt-1">Strengthening our fellowship...</p>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
